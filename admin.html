<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>پنل مدیریت سوالات</title>

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
font-family:Vazirmatn;
background:#f5f7fb;
margin:0;
padding:40px;
}

.container{
max-width:1000px;
margin:auto;
}

h1{
text-align:center;
margin-bottom:30px;
}

.item{
background:#fff;
padding:20px;
border-radius:15px;
margin-bottom:20px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.meta{
font-size:13px;
color:#777;
margin-top:10px;
}

textarea{
width:100%;
height:100px;
padding:10px;
margin-top:15px;
border-radius:10px;
border:1px solid #ddd;
font-family:inherit;
resize:vertical;
}

.actions{
margin-top:15px;
display:flex;
gap:10px;
}

button{
border:none;
padding:10px 20px;
border-radius:10px;
cursor:pointer;
font-family:inherit;
}

.approve{
background:#1e88e5;
color:white;
}

.answer{
background:#2e7d32;
color:white;
}

.delete{
background:#d32f2f;
color:white;
}

</style>

</head>

<body>

<div class="container">

<h1>
مدیریت سوالات کاربران
</h1>

<div id="questions"></div>

</div>

<script type="module" src="js/admin.js"></script>

</body>
</html>
