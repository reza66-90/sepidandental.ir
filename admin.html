<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<title>پنل مدیریت مقالات</title>

<style>
body{font-family:tahoma;background:#f5f5f5;padding:40px}
input,textarea{
  width:100%;padding:10px;margin:10px 0;border-radius:10px;border:1px solid #ccc;
}
button{
  padding:12px 20px;background:#0b2d5c;color:white;border:none;border-radius:10px;
}
</style>
</head>

<body>

<h1>➕ افزودن مقاله جدید</h1>

<input id="title" placeholder="عنوان مقاله">
<input id="url" placeholder="لینک مقاله (articles/test.html)">
<input id="image" placeholder="آدرس عکس">
<input id="category" placeholder="دسته‌بندی">
<textarea id="desc" placeholder="توضیحات"></textarea>

<button onclick="savePost()">ذخیره مقاله</button>

<script>
function savePost(){

  let posts = JSON.parse(localStorage.getItem("posts")) || [];

  const newPost = {
    title: document.getElementById("title").value,
    url: document.getElementById("url").value,
    image: document.getElementById("image").value,
    category: document.getElementById("category").value,
    desc: document.getElementById("desc").value,
    date: new Date().toISOString()
  };

  posts.unshift(newPost);

  localStorage.setItem("posts", JSON.stringify(posts));

  alert("مقاله ذخیره شد");

  location.reload();
}
</script>

</body>
</html>
